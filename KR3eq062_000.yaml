body:
  text: 正文門人問曰世人皆以十二經絡五臟六腑現證為治法準繩先生以為然否曰此以人身臟腑言之則是但人之一呼一吸貫通天地之氣若未與天地人相參則不足以為良工使以膚見礙於胸中臨證豈免虛虛實實之誤爾輩青眸炯炯意氣雄雄務以群書博覽深究軒岐仲景與天地人三才合化則神機在我法眼天開用之無窮至於無方可執無法可憑千蹊萬徑終屬自己權衡圓融變化才是仁術子若疑團未破試以三才合化言之不惟臟腑而已然醫學不明人身臟腑應乎天時地理五運六氣則不知五臟有太過不及陰陽有升降五行有相生相剋反生反克顛倒施治之妙用也即如子午少陰君火司天屬熱土運濕氣太過陽明燥涼在泉初氣厥陰風木二氣少陰火熱三氣少陽相火四氣太陰主濕五氣陽明主涼六氣太陽主寒是為主氣若初見太陽二見厥陰三見少陰四見太陰五見少陽六見陽明乃為客氣加臨而風寒暑濕燥火不一故素問六元正紀大論謂厥陰所至為裡急支痛緛戾脅痛嘔泄少陰所至為瘍疹身熱為驚惑惡寒戰栗譫妄衄衊語笑太陰所至為積飲痞隔為畜飲中滿霍亂吐下為重胕腫少陽所至為嚏嘔瘡瘍驚躁瞀昧暴病為喉痹耳鳴嘔湧為暴注瞤瘛暴死陽明所至為浮虛為鼽尻陰股膝髀腨䯒足病為皴揭鼽嚏太陽所至為屈伸不利腰痛為寢汗痙為流泄禁止此乃六氣見病之常也運有歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴腹支滿上應歲星歲火太過炎暑流行肺金受邪民病瘧少氣咳喘血溢血泄注下咽燥耳聾中熱肩背熱上應熒惑星歲土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤上應鎮星鎮音填歲金太過燥氣流行肝木受邪民病兩脅下少腹痛目赤痛眥瘍耳無所聞肅殺而甚則體重煩冤胸痛引背兩脅滿且痛引少腹上應太白星歲水太過寒氣流行邪害心火民病身熱煩心躁悸陰厥上下中寒譫妄心痛寒氣早至上應辰星歲木不及燥乃大行生氣失應草木晚榮民病中清胠脅痛少腹痛腸鳴溏泄涼雨時至上應太白星歲火不及寒乃大行民病胸中痛脅支滿兩脅痛膺背肩脾間及兩臂內痛鬱冒朦昧心痛暴瘖胸腹大脅下與腰背相引而痛甚則屈不能伸髖髀如別上應熒惑辰星歲土不及風乃大行民病飧泄霍亂體重腹痛筋骨繇復肌肉瞤酸善怒藏氣舉事蟄蟲早附咸病塞中上應歲星鎮星歲金不及炎火乃行民病肩背瞀重鼽嚏血便注下收氣乃後上應太白星歲水不及濕乃大行民病腹滿身重濡泄寒瘍流水腰股痛發膕腨股膝不便煩冤足痿清厥腳下痛甚則胕腫藏氣不政腎氣不衡上應辰星此乃六氣五運太過不及所至必有之病須以二十四氣節候占之早晏如立春初候東風解凍二候蟄蟲始振三候魚陟負冰余皆仿此若時至而物不應謂之來氣不及時未至而物先應謂之來氣有餘故謂在天為玄在人為道在地為化化生五味道生智玄生神神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水在天為氣在地成形形氣相感而化生萬物是為六元而治病必當明此太過不及以應人身臟腑經絡受邪現證則為醫師把柄若混然不辨而以寒熱溫涼燥濕皆謂傷寒則全失經旨矣故仲景謂六淫之邪入於經絡皆見頭痛項腰脊臂腳掣痛謂之陽病十八若入臟腑即顯咳上氣喘吵咽腸鳴脹滿心痛拘急謂之陰病十八若在內傷陽盛則陰病陰盛則陽病氣盛則血病血盛則氣病至理相隨纖毫不爽故昔賢以良相比良醫而相以燮理陰陽治天下醫以燮理陰陽治一身然相操生殺之權醫秉安危之任務必燮理陰陽則調和遍體否則動罹百損氣血乖違夭人長命故欲求醫學之明須合三才則能燮理陰陽醫事乃畢非惟經絡臟腑而已客曰冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期願子釋之蓋聞洪荒未判黑白混為一體名曰無極無極動而太極生太極生兩儀而分四象八卦至於六十四卦成三百八十四爻變以至無窮無極之變化皆歸一而已矣夫太極動而清濁分清濁既分則清氣上升而為天日用星辰麗乎中風寒暑濕燥火行於內濁氣下降而成地則江山土石成於地木火土金水化於中陰陽行役於其間謂萬物之外六合之內天地之應而冬至四十五日陽氣微上陰氣微下此陰陽上下者乃指地面為界也然冬至居於坎子而陽生為來歲之綱陰極而主退乃一線陽機蠢動於九泉為一陽生於群陰之下而主進即易之復卦也群陰用事月行北陸高懸中天日行南陸低近於海嶽故嚴寒冰雪發於子醜兩月而陽氣微上俟冬至四十五日者乃指立春節也當以復卦觀之冬至則一陽初動於五陰之下漸次而升所以老陽數九九日方升一位則當五九四十五日陽氣始出於地界而陽用事陽氣從東漸出於地陰氣從西漸入於地所謂陽氣微上陰氣微下至於春分則陰陽平半溫煦始行漸至熱極至夏至而陰垢矣即彼春之暖為夏之暑也然夏至居於離午為今歲之半陽極而主退乃一線之陰微動於九泉為一陰生於元陽之下而主進即易之垢卦也純陽用事日行北陸高麗中天月行南陸低近海嶽大熱炎暑爍石流金發於未申兩月而陰氣微上俟四十五日立秋者何耶蓋一陰初垢五陽之下以從老陽九數而退一位則當五九四十五日陰氣用事乃陽氣從西漸入於地陰氣從東漸出於地謂陰氣微上陽氣微下矣蓋復卦從陽而進垢卦從陽而退不從陰數而退者乃陰隨陽轉尊陽而不尊陰也至於秋分則陰陽平半金風始動微涼生而至寒極至冬至而陽復即彼秋之忿為冬之怒也當以太極觀之而黑白中分頭尖尾大可見冬至陰退而陽進夏至陽退而陰進陰陽出入循環無端乃陰根乎陽陽根乎陰陰陽相抱而不離故陰陽日月行乎天地之間則天人同化所以夏至應離火在人應心而主熱坎水內潛則井水寒而脈應浮如魚之遊在波泛泛乎萬物之有餘冬至則應坎水在人合腎而主寒離火內潛則井水暖脈應沉而下膚蟄蟲周密乃陰陽進退規矩權衡故謂陰陽有時與脈為期而司天運氣太過不及仿此類推即知陰陽升降進退而察症治病則纖毫不爽也客問地氣上為云天氣下為雨雨出地氣云出天氣願子釋之易曰大哉乾元萬物資始至哉坤元萬物資生乃順承天蓋天地者萬物之首也雲雨者天地所統之物也升降者天地陰陽之性用也然天有蒼天丹天素天玄天黅天之五氣而應木火土金水之五運運行於地六氣環周於天也夫天之氣地之運陰陽升降即具在其中矣是故天氣從高而降萬物應之則化生無窮地氣從下而起晴空得之則白雲彌岫日麗穹蒼此乃天地交泰陰陽升降之恆然天有太過有不及否泰之變隨時而應故天氣不足則鬱而不伸地氣從之濁陰加於天上即地氣上為云矣因地氣升則水亦隨之於上故經謂太陰司天水則上從黑氣反用云奔雨府然地濁之陰既加於天則天清之陽必有勝復而降水隨天氣化為滂沱寒雨數至即天氣下為雨也蓋水居湖海誠同地濁上升於天必隨天氣下降故為雨出地氣而云騰霄漢霧滿圓區是因天氣不足地氣上從而化故為云出天氣也蓋三才同化而人應之既飲食入胃上輸於脾脾氣散精上輸於肺即地氣上而為云也通調水道下輸膀胱乃天氣下為雨矣若應乎病即濁氣在上則生䐜脹清氣在下則生飧泄從此悟治民病則移凶換吉轉否為泰無不易易耳客問今治四時傷寒者一二日之間太陽表證首以九味羌活香蘇十神次以柴葛解肌五六日間輒以小柴和涼膈治之口稱是遵仲景之法窈有疑焉願子釋之豫駭曰此問前人未之有也自仲景以下發明傷寒諸書甚廣皆不明六經傳變屬寒屬熱概以雜湯調治四時豈仲景之旨乎夫六經之旨惟長沙一人而已後賢未達其奧不知四時有四時之經六氣有六氣之證四時有四時之治若以冬月治傷寒之法混治四時六氣以四時六氣湯法混治冬月傷寒乃違仲景之法何為法遵仲景耶蓋四時之病務明六氣為綱十二經為緯次窺傳變治始有功經謂無失天信謹察病機四時為宜而四時傷寒不過混稱其名減有風寒暑濕燥火六氣之別豈可一概謂之傷寒乎如夏秋經絡在手春冬經絡在足俗醫不分經有手足邪有寒熱以方法顛倒逆施誅伐無過豈不致微者篤而篤者死耶經謂人之傷於寒也則為病熱熱雖甚不死者乃冬月足經之論仲景有麻桂承氣等湯法度森森今人反謂古方難用置之不論致病危篤而死嗚呼傷寒有法尚且變為無法何況春夏溫熱先賢未經闡法能免後人聵聵者乎即如河間發明熱病欲用苦寒而病情經絡仍然不離冬月傷寒足經立論是亦不足尚矣蓋春夏感冒皆由君相火令經屬手少陰少陽秋冬寒涼之氣經屬足三陰三陽以此觀之是有天地兩分詎可漫然不察乎昔賢著傷寒方書甚多悉屬依樣葫蘆不少以溫熱之病亦謂傷寒惟仲景條例雖為傷寒立論誠該四時表裡陰陽虛實無所不明所以讀仲景書能治傷寒即能治溫熱但後人不能明其微旨概謂傷寒非惟不能圓融變化是猶舟子不識風帆動罹覆溺也更欲究明素難靈樞要旨感冒六淫傳變之法但有時令主客之分而主氣春夏為溫熱秋冬為寒涼次以客氣緯之若時氣入臟即當隨時令治之則風寒暑濕燥火之邪治始有歸矣客曰如是之辨六淫之邪誠各有歸然六淫之邪必由太陽而入豈可舍太陽而從他經治乎答曰有子一間治四時感冒更益彰著但初感之邪是從太陽皮毛而入人咸知之但不知邪入太陽遂有當令經絡臟腑應接其邪而病故不可竟攻太陽如冬月正傷寒而無他經應接只在膀胱本經所以羈留三五七日經氣復而即解若氣未復或傳陰傳陽是未可定因其司令故也設在春月風邪入於太陽肝即應接而去所以不病太陽而病厥陰故但發熱目弦嘔吐胸脅脹滿胃脘當心而痛少腹拘急脈弦若初夏君火心包應接而病遂顯身熱頭弦或疼或不疼甚則煩躁譫言喜笑不休或發癮疹手厥陰等證若夏時相火應接微覺惡風頭眩微疼發熱自汗甚則心煩斑疹右手脈大三焦手少陽為病乃為溫熱病也若在長夏則脾土應之在秋則肺金應之冬時嚴寒感入太陽膀胱本經自病故惡寒發熱頭疼腰脊強痛無汗脈浮而緊所以仲景立麻桂諸湯示人治傷寒表裡陰陽發表解肌諸法而為規矩以此推治溫熱病則無過差但用藥有甘熱辛涼之別也客曰風寒之邪是屬陰陽矣然不識寒邪入於皮膚經絡血脈肌肉之中亦可變為熱乎請求明之曰此理早已顯著於靈素仲景諸書奈人不察耳蓋風傷衛證原因陽氣開泄以陽從陽故顯發熱自汗脈緩若寒傷榮證肌竅閉塞身熱無汗脈緊此病風寒之常也然或傷寒自汗淋漓者此非邪氣之變乃人身陽虛之變證也而邪之本性則風為陽邪善行數變是不待言寒為陰邪冰凝氣血何能變耶使寒能變熱則當肌體自如何致在表則發熱惡寒身體疼痛在裡則有胸滿腹痛下利諸病乎要知寒邪感入人身經絡郁遏肌表之陽則為惡寒身熱抑鬱臟腑之陽則為狂言譫語胸滿腹脹狀雖似變而實不變也奈昧者不明認寒變熱豈不謬乎試觀仲景治風寒兩傷於麻黃湯中加石膏為大青龍湯寒熱並用者取麻黃去寒石膏去風用梔子乾薑湯治身熱不去微煩者以乾薑治入胸中之寒梔子吐去標化之熱觀此義則外感風寒不變可瞭然矣即如冬寒藏於骨髓郁遏臟腑之氣而隨春升陽氣外發則為溫熱病若寒變為熱其寒早已消釋更有何邪至春發為溫熱病乎夫寒邪始入之陽遏郁正氣故顯心煩口渴若遇其人腎陽素虧寒邪傳入陰經以陰從陰陰邪彌盛陽證退而陡顯手足厥冷下利自汗虛寒之陰證可見在陽不變故傳陰經即顯陰證使在三陽已變為熱豈有入陰而復變為寒乎俗謂陽證變陰而死者蓋因不明斯理也辨天地六氣標本素問天元紀大論曰在天為玄玄生神而神即風熱濕燥寒之氣故謂神在天為風在地為木以下四句失一神字也在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水此乃以在天之氣為本在地化生木火土金水在人應之於手足三陰三陽而為標但標之裡即為中氣故素問六微旨大論云少陽之上火氣治之火氣在天屬陽為本少陽在地為標標本同為陽故從火之本治此明治熱以寒也即手少陽與厥阻為表裡故取手厥陰在中而為中氣陽明之上燥氣治之此明治涼以溫也燥氣在天屬陰為本陽明在地為標而陽明與太陰為表裡本陰標陽不同故取手太陰涼為中風而治也太陽之上寒氣治之此明治寒以熱也寒氣在天屬陰為本太陽在地屬陽為標與足少陰為表裡中見少陰為中氣標本不同或從本寒或從標陽之治也厥陰之上風氣治之此明治溫以涼也風氣在天屬陽為本厥陰在地屬陰為標標本不同故取足少陽溫為中氣而治也少陰之上熱氣治之此明治熱以寒也熱氣在天屬陽為本少陰在地陰氣為標標本不同治則或從標陰或從本熱中見手太陽為中風也太陰之上濕氣治之此明治濕以溫也濕陰在天為本太陰在地屬陰為標標本皆同治則從濕為本而取足陽明為中氣也然取中氣者因寒熱陰陽不同所以捨天之本捨地之標取中見之氣為治故治手陽明乃燥氣在天為本陽明在地為標本燥標陽無可走治而取天之下地之上中氣手太陰之涼氣而治足厥陰風氣在天為本厥陰在地為標風與陰標本不同無可定治故取中氣是少陽之溫氣主治昔人注內經論及標本者皆以手陽明之燥反取足太陰之濕足厥陰之風反取手少陽之火然手足司令不同豈為上中下三合若標本不明治證則失故引本經而證之客曰四時傷寒嘗有陽證陰脈而死者何也曰病發於表頭疼身熱脈浮而緊為陽證陽脈若見沉弱而遲即為陽證陰脈此因陽虛內真寒而外假熱治當從脈不從證經謂脈證相反是也仲景謂病發熱頭痛脈反沉若不差身體疼痛當救其里宜四逆湯又少陰病始得之反發熱脈沉者以麻黃附子細辛湯人皆知之今之俗流見脈浮小細軟亦為陽證陰脈妄投姜附其中大有差別矣然浮小細軟乃為陽中之陰非真陽虛而脈見微弱沉遲之比因素稟血氣不足故脈似陰若果是陰證脈必沉遲當以薑桂附子是無疑議若浮小細軟脈不沉遲是屬營虛則當補養營血為主仲景謂榮氣不足不可發汗先用建中後用發表東垣用補中益氣加散表之藥是也奈何俗醫不察陰陽之別一概混稱陽證陰脈大劑薑桂附子助陽劫陰而脈愈細河間所謂竭絶殘陰而死者不知凡幾嗟乎道聽途說偏用熱藥之流悟耶否耶客謂王太僕云龍火得濕而焰遇水而燔不知其性以水折之適足以光焰詣天物窮方止識其性者反常之理以火逐之則燔灼自消焰火撲滅余見方士遵之或有愈者有病變蜂起而死者何耶願子釋之答曰前賢以虛陽上泛是比諸病甚者外現假象而言故當從治之法然虛者得其益若實者臟腑重添烈火不死何待蓋外感證如仲景謂下利清穀裡寒外熱手足逆冷脈微欲絶身反不惡寒其人面赤色乃腎中真陽虛而陰盛寒邪傳入腎中以陰從陰逼其微陽上越內真寒而外假熱故用通脈四逆熱劑而從治必見手足逆冷脈沉遲細為的若二三日心中煩不得臥者乃腎中陰虛風邪傳入腎中以陽從陽陽實之症故用黃連阿膠寒劑救陰而逆治必見脈沉而數手足熱而燥渴為的然皆龍火為病惟分虛實為主也若內傷腎陽脾腎俱虛而作水腫水泛為痰諸證亦必脈沉遲細手足微冷則當熱劑補陽故王太僕謂益火之源以消陰翳若腎中真陰虛極水不攝火火無所歸即現喉爛聲嘶咳逆喘急雖亦龍火上焰與虛陽上浮不同此因水枯陰竭陽失陰而浮者非補陰何以收散亡之氣故有壯水之主以鎮陽光之別然外感陽盛風熱為病必當知柏芩連而瀉實火陽虛陰盛寒逼陽浮是當姜附以火逐之是無餘議若內傷陽盛陰虛即當地黃枸杞補陰而配陽若陽虛陰盛是當補陽而消陰翳此四法亙古無移況素問六氣君相同治皆以鹹冷虛則反之當用溫熱從治矣蓋凡五臟皆有從治非獨龍火為然經旨明如日月今人混用姜附居然名家詎知誤人不淺盍遵其經及守仲景諸法乎只因王氏立言缺明虛實為訓惟曰火逐以使後人買櫝還珠不辨脈證真假虛實妄治是以因藥而死者居多矣嘗見脈浮數大無前脈證亦認陽虛妄治而死者更不知凡幾也余謂龍火惟分虛實之治是無過差則醫之能事畢矣客曰善客曰人犯房勞而感風寒謂之陰證傷寒徑投姜附得無疑乎答曰舉世類皆謂之豫獨不然經云水火者陰陽之徵兆也天地賴此水火陰陽即能生長收藏化生萬物人體賴此充身澤毛虛邪賊風皆不能害然陰陽即水火寄於兩腎但左腎屬陰主寒水右腎屬陽主熱水而右腎且通膀耽一為生髮之源一為閉藏之主水火兩平氣血營衛皆和不惟無病而且身體強健壽算遐齡若醉以入房以欲竭其精以耗散其真使不虧於火即虧於水陰陽偏盛血氣乖離矣若虧於火者卒遇嚴寒凜冽之氣乘虛感入腎間即病四肢厥冷畏寒發熱腹疼泄利面赤戴陽躁急心煩脈微沉遲無力或豁大空虛浮數按之不鼓此因陽虛受寒陰寒彌盛必須姜附四逆救陽為主者人皆識之然有不傷於陽而傷於陰者一遇虛邪賊風感入腎間即病身熱似火燎口渴躁煩經謂是人陰氣虛陽氣盛少水不能制盛火而陽獨治逢風而如炙如火者是也必以大劑六味地黃湯先滋其陰以俾真陰不絶然後束表始為合法醫不明此僅聽病人口藉遂為陽虛陰證亂投姜附熱劑耗竭真陰致使陽狂躁亂而死者不知几几矣及遇真陽虛而發熱內真寒而外假熱者反投苦寒遂致四肢厥冷陽脫而死亦不知几几也業醫者當深察之客曰骨蒸內熱皆屬相火是否曰雖屬相火必達淵源則可若不識起病之源但知以牡丹地骨分治有汗無汗之骨蒸隔靴瘙癢竟若天淵要知相火之旺必因腎水虛衰失水浸灌骨髓空虛火陷骨中則蒸熱不已但其源有二若心包相火以挾肝氣入骨蒸熱則無汗若手少陽相火入骨蒸熱其機開泄外發則當有汗即脈經謂之陽陷入陰精血弱是也世用壯丹皮者氣味辛涼色赤清發手足厥陰之火而地骨皮味甘氣寒皮能走表乃平少陽之火後人不明經絡而用養陰退陽惟以牡丹皮治無汗地骨皮治有汗車載斗量全無一效是皆昧其調和營衛生心血養腎水以制陽光之旨但賴二味清熱並用苦寒不惟無益反取敗矣客曰東垣脾胃論云飲食不節則胃病形體勞役則脾病胃病短氣精神少怯而生大熱顯火上行獨燎其面脾病則四肢怠惰嗜臥不收大便泄瀉據此則當補脾胃是無疑乎曰東垣因虛立論果當補之但脾虛補脾胃虛補胃人咸知之然脾胃既虛必因母氣失陰又當補其母蓋因脾土相火生之胃土心火生之故胃虛則當補心而生戊土若脾虛當補腎中真陽而生已土所以有補脾不如補腎之說若腎水不足又當補後天脾胃營血有形之質以濟腎水故有補腎不如補脾之說後人不解內有土生水水生土互濟之妙但說補脾不如補腎補腎不如補脾徒讀其書泛然用藥故不效也東垣但以虛言不可概論倘遇小邪入里邪氣壅逆為病又當瀉之慎毋膠柱鼓瑟客曰情志虛勞之病治法頗多終無一效何也不可明之曰此說甚繁聊舉大綱以求教政夫情志虛勞之病乃非外邪所致皆從自心勞傷血氣而得經謂非針藥之可療必先反己而去其情欲然後求人之藥草庶能愈病昔神農製藥不過驅邪補虛瀉實豈能挽回人之情欲也哉世人皆由不知七損八益之道四時調神之法荒淫酒色違逆天時病從內生也蓋六合之內萬物之外一切塵緣皆從自心起見故我心生則天地萬物皆生我心滅則天地萬物皆滅道德經云無名為天地之始有名為萬物之母人與天地相參所以天之生地之化入之運用正天得一以清地得一以寧人得一以靈三才互相併化於其間也夫人稟天地陰陽剛柔之氣而生若得剛柔相濟中和之氣者為人聰明忠孝寬緩和平情欲不能牽縛喜怒妄念而不自生若稟陰陽偏勝殺厲之氣者為人愚頑怪癖強暴姦凶嗜欲不節觸處皆成荊棘大地盡屬無明但人得偏氣而生者多所以罔識立命之根自生顛倒心生喜怒以致臟腑應而成病苟能守意如城諸妄現前自能化為清涼之境即此為靜則生陰鎮攝陽光調和五臟病妄從來是故動靜起居在乎心用心清則火降血氣安寧心動則火起擾亂氣血必使心神氣血和作一團無見無餘自然而然則心廣體胖若以恬憺虛無視為怪癖邪侈房欲喜怒反為日用尋常之事致傷臟腑而成尪羸之軀古人謂喜起於心心臟應之怒起於心肝臟應之憂起於心肺臟應之思起於心脾臟應之恐起於心腎臟應之至於恚勞動靜無不由心而起所以各應臟腑氣血而受其病也夫心為一身之主包含天地內統五行無為而治日應萬機不偏不倚寂然不動感而遂通故楞嚴經云性體真空性空真體地水火風隨心動處而生一加穿鑿則身受傷故至聖謂至中和天地位焉萬物盲焉乃體用皆同動靜一如為修身立命之正法眼藏若違斯理無有不成病者即如天氣正則人民皆安生育萬物天氣不正人民皆病火荒饑饉無所不至所以在人心正則臟腑安和氣血宣流心不正則無明頓起氣血乖離傾吐咳嗽之疾接踵而至洞神經云寵辱不驚肝木自寧動靜以敬必火自定調息寡言肺金自全飲食有節脾土不泄恬憺無欲腎水自足詩謂關睢樂而不淫哀而不傷事不過節則無疾病故得斯病者貴在恰情逸性善惡雙消則能保全生命設將已病委託醫師認為消災釋病仗諸草木奉為復元之品情欲不屏迷戀酒色病日傾危此乃自趨死徑何關醫無良法也若為醫者必告至明至理使病者身心降服賓主相投治始有功設病者我慢輕心自不勉力降伏身心病勢增危以致不救奈何或醫者不明至理亂投藥食佞口飾人希冀僥幸只圖財利苟且應命不加勸慰惟有逢迎遷就病者以致危殆此貪幸無恥之流莫逃乎罪也豫七情虛勞之病經歷三十餘年百中難保其一痛切憂心夢寐之間神思恍悟聖人之教千言萬語諄諄致囑修身卻病良方皆出自心不從他得經云恬憺虛無真氣從之精神內守病安從來為無為之事樂恬憺之能從欲快志於虛無之守則壽命無窮與天地終余少得斯疾而虔修聖賢之教清心寡欲調養性情謝絶世緣諸恙漸愈如得鍾離老祖九轉之還丹服藥便是普門大士楊枝之甘露此聖人不治已病而治未病之妙法若然不悟聖言惟有捐命而已客曰今人皆喜甘熱溫補而惡苦寒是何義歟曰若因外感致病必當治熱以寒治寒以熱治溫以涼治涼以溫乃為正治故經有肝苦急木喜柔和急食甘以緩之然肝木盛而必剋土故用甘補脾而緩肝急心苦緩心為一身之主緩則散慢不收故急食酸以收之乃收心熱之不及也脾苦濕土喜潤而惡濕故急食苦以燥之乃燥脾濕之邪也肺苦氣上逆金性收降故急食苦以泄之乃泄肺氣之實也腎苦燥水喜滋澤故急食辛以潤之乃潤腎水之枯涸此隨臟性之逆順也又曰肝欲散急食辛以散之辛補酸泄辛去邪從其性而為補酸斂氣逆其性乃為瀉也心欲軟急食鹹以耎之咸補甘瀉咸屬水而瀉火故為補甘抑其陽乃為泄也脾欲緩急食甘以緩之苦瀉甘補苦燥去濕為泄甘益其緩乃為補也肺欲收急食酸以收之酸補辛瀉酸從其性則為補辛散逆其性則為瀉也腎欲堅急食苦以堅之苦補咸泄苦燥賊邪則為補咸軟其堅即為瀉也此由邪實則瀉正虛則補故謂虛者補之實者瀉之寒者熱之熱者寒之或見寒以寒見熱以熱乃為從治是非一概施行今之庸俗未曾深究聖經賢傳博覽群書道聽途說妄謂遵從仲景東垣立劑溫補王道而病者聽信佞才甘受其毒竟不知人之陰陽氣血以平為貴此猶人之兩目金屑雖貴落眼即成翳疾或有陰勝者果宜桂附乾薑鹿茸之類陽勝者只宜甘涼以滋陰水即地黃枸杞知母麥冬之類若氣虛者人參黃耆炙草白朮之類血虛者當歸白芍四物之類此為補藥之正也客又曰世以陽生陰長必以補陽為主曰此出膠柱鼓瑟之流非通靈素圓變之論也蓋陽生陰長者經言無病之體天地春秋升降自然之道而人應之肝心肺腎生化收藏之理何曾講論病體藥力能為之事豈不聞無代化無違時必養必和待其來復耶余見陰虛之病已成陰陽先已偏勝俗流不明至理妄投佳附大辛大熱劫絶其陰而死者不知其幾乎更有不才而以大熱毒藥合成興陽澀精之藥假名種子丸丹逢迎富貴希圖財利而世人聞之樂意從事嗚呼有子未生即發熱毒而身先殞滅縱生子女非遊丹即痘疹而死若求嗣者惟宜恬憺虛無清心寡欲至期交姤則不服螽斯丸而螽斯必自至也客問四時疫病咸謂異氣所傷而致未識寒耶熱耶請明示之答曰軒岐倉扁並無異氣之說今得此問可破千百世之訛矣蓋疫者乃沿街合巷或一村一鄉坊隅之間長幼俱病證現皆同乃為疫病說文謂之民皆疾也是因風寒暑濕燥火客氣流行於方隅而人應之則病皆相似若夏月而值太陽客寒加臨則病寒疫冬月而值少陽客火加臨則病冬溫其餘風濕燥暑四氣加臨則當隨其何氣便為何疫也奈後人不辨屬寒屬熱混稱異氣雜氣又謂不從經絡臟腑而入是從口鼻入於募原而用達原飲治之蓋口鼻膜原必竟是屬臟氣所司即如蛤蟆疙瘩瓜穰軟腳大頭諸瘟小兒痘瘡痧疹皆有臟腑經絡氣血所屬乃凡有血氣者莫不尊親豈有漢不收而秦不管之地耶且謂積於募原而浮於某經即顯某經之證此乃冬感至春發病疫病豈有此發即雲浮起若邪未浮於經伏於膜原是無病狀可稽何以先知是疫遂用達原飲而治之乎蓋疫病乃總名迅速感發而六淫皆可致疫故內經六氣主客惟有君相二火為茶癘溫癘即是疫病也余故著溫熱病論立柴芎香豉湯香豉散火湯表裡二方適值康熙庚申二三四五月君相二氣之間疫癘盛行以治數千人而得皆愈所以疫邪屬熱本當清熱兼補其虛則善此為疫病明本之論其餘標證當參諸家方書是無失矣客曰四十九難有五邪所傷即肝主色心主臭脾主味肺主聲腎主濕五邪為病然入心為赤入脾為香入肺為辛入腎為呻入心為汗較內經肝青肺白心赤脾黃腎黑與聲之笑哭呼歌呻味之甘酸苦辛咸臭之焦腥臊香腐寒邪之傷腎濕邪之傷脾而難經主一入字全不相侔願問其解曰此五論乃越人示後學察症治病之心髓今人草草讀過良可嘆惜蓋以心肝脾肺腎而主色臭味聲濕互位相乘五變現證是出內經五五二十五陽顛倒五行之旨推廣發明繹為五色五臭五味五聲五液傳變現證脈體具備神機妙化千占無人道及惟張潔古深得其奧增廣其文合為五五二十五傳之法精義極矣誠能熟味此篇則業醫之事思過半矣若徒讀其文不思其意有何益哉客問四十九難曰有正經自病有五邪所傷何以別之然言憂愁思慮則傷心形寒飲冷則傷肺恚怒氣逆上而不下則傷肝飲食勞倦則傷脾入坐濕地強力入水則傷腎乃正經自病也注曰諸經之因各屬經絡臟腑比如憂愁皆從心起故傷於心肺燥屬涼形寒飲冷以寒從寒肺即應之故傷於肺恚怒乃起於心而肝應之怒為肝志故傷於肝飲食入口脾胃受之營衛所出以溉五臟六腑一有不節則脾氣當之故傷於脾脾主濕土腎主寒水雖然土能剋水因水濕同類故坐濕地而腎受之則傷於腎此五邪各從其類所傷不從他經傳乘故為正經自病客曰何謂五邪然有中風有傷暑有飲食勞倦有傷寒有中濕此之謂五邪注曰此天地六淫之邪傷人臟腑故為五邪然飲食勞倦雖非天地之邪氣乃因飲食失節傷損脾胃不能充濟諸經臟腑以致五邪乘虛感入諸經為病故謂飲食勞倦雖不言邪而邪在其中矣客曰假令心病何以知中風得之然其色當赤何以言之肝主色自入為青入心為赤入脾為黃入肺為白入腎為黑肝為心邪故知當赤色也其病身熱脅下滿痛其脈浮大而弦注曰風氣通於肝肝受風邪而傳於心母邪溢子從後來者謂之虛邪是也然肝屬風木而主色者何也蓋風氣屬陽而主生髮變動所以主色若無風邪入肝則色不現非風木之邪入於他臟則他臟之色不現而肝邪傳至他臟則現他臟之色凡在病中而見面部五色病人眼見五色吐下之五色或喜五色惡五色故青黃赤白黑皆屬肝邪所致故在本臟謂之自入為青而入心為赤入脾為黃入肺為白入腎為黑此乃肝風入心而心受病故現赤色為得之中風風火相待故病身熱本邪從肝而來故脅下滿痛其脈浮大而弦浮大屬心之風火弦屬肝邪傳心其色必應青而帶赤餘臟之病與色仿此客曰何以知傷暑得之然當惡臭何以言之心主臭自入為焦臭入脾為香臭入肝為臊臭入腎為腐臭入肺為腥臭故知心病傷暑得之也當惡臭其病身熱而煩心痛其脈浮大而散注曰心屬暑熱暑亦屬熱以熱從熱故心臟受暑謂之正邪自病然心屬火其中有無形炎焰之氣故主臭臭者氣也心自受病故當惡臭若在本臟即為焦臭傳於脾為香臭入肝為臊入腎為腐入肺為腥凡病喜五臭惡五臭吐下之五臭故香臊焦腐腥皆從心邪乘來所致而心邪自病則惡焦臭矣其煩心痛脈浮大而散皆本經病脈證也客曰何以知飲食勞倦得之然喜苦味也虛為不欲食實為欲食何以言之脾主味入肝為酸入心為苦入肺為辛入腎為咸自入為甘故知脾邪入心為喜苦味也其病身熱體重嗜臥四肢不收其脈浮大而緩注曰心病由飲食勞倦得之即從前來者謂之實邪是也蓋凡飲食入胃而胃為倉廩之官五味出焉故飲食勞倦所以主味心病得之飲食勞倦則喜苦味凡病喜五味惡五味嘔吐之五味故甘酸苦辛鹹皆屬飲食勞倦脾邪所致虛則氣弱故不飲食實則邪熱消穀故欲飲食若傳於肝為酸入心為苦入肺為辛入腎為咸自入為甘此脾邪入心或因脾致虛心臟而致心病故喜苦味也其病身熱為心受病體重嗜臥四肢不收為脾病其脈浮大主心緩主脾也客曰何以知傷寒得之然當譫言妄語何以言之肺主聲入肝為呼入心為言入脾為歌入腎為呻自入為哭故知肺邪為譫言妄語也其病身熱灑灑惡寒甚則喘咳其脈浮大而澀注曰此言傷寒者即仲景謂大邪中表邪從皮毛受而傳裡為病乃從前來者實邪是也形寒飲冷先傷肺之皮毛傳至於心而心主語肺主聲心為神明之主肺邪傳心神明躁亂而肺聲隨心所轉故發譫言妄語但入肝為呼入心為言入脾為歌入腎為呻自入為哭凡病聞五聲喜五聲惡五聲故呼言歌呻哭皆是肺受燥寒所致故此肺邪入心合為譫言妄語其身發熱即心病灑灑惡寒乃肺病甚則入肺而為喘咳其脈浮大屬心澀屬肺也客曰何以知中濕得之然當喜汗出不可止何以言之腎主濕入肝為泣入心為汗入脾為涎入肺為涕自入為唾故知腎邪入心為汗不可止也其病身熱小腹痛足脛寒而逆其脈沉濡而大注曰心病得之中濕乃謂從所不勝來者賊邪是也蓋心主陽熱濕主陰邪水濕同類濕淫所勝腎受濕邪濕寒交盛上逆凌心心陽不守心液外越故汗出不可止也然不可止者乃言不可止心之汗宜逐腎邪之謂耳蓋腎濕之邪傳於五臟隨其他臟而變故入心為汗入脾為涎入肺為涕自入為唾要知吐五液少五液而汗涎涕唾液皆屬腎邪所致故此邪入心為汗其病身熱為心病小腹痛足脛寒而逆為腎病沉濡為腎脈大為心脈也按此五條闡明靈素二十五陽五行顛倒察病傳變神化之機乃越人呼吸相通軒歧一貫之理若讀此五篇則八十一難皆明然述八十一難猶探爻以作易讀三百篇而賦離騷之意乃上古先賢哀憫後世蒼生之至故業軒歧之道必先登扁鵲之堂則思過半矣跋意穩見夫子診證濟世嘗懷未足慮醫之正學久湮紕繆日多是以弗憚苦心取仲景書於應酬之暇乘皓月以參詳或簧燈以殘漏提海蕙等而兼閲注述撰有溫熱病論虛勞內傷天元樞法傷寒辭潔坤儀髓要客窗偶談治證神機雜病等書一百餘卷統曰醫徵誠軒歧之正學濟世之津梁也茲先以仲景傷寒金匱溫熱內傷四書屬蕙等校讎付梓蕙弗獲以無能辭受而讀其所注蓋非頓明心地深透軒歧之理者莫能及也即如注金匱之治未病發明時今之虛實陽病陰病之十八即以六淫營衛而分之陰毒辨非虛寒百合邪流臟腑婦人諸病皆為血海受邪一源而出傷寒之病機流伏以厥陰之木邪臨土而厥互明六經之生克與夫創發內經之溫熱病論此皆仲景以後諸賢未能道者矣夫子悉啓其祕真為造物以生人其有益於後世不淺豈僅為軒歧仲景之功臣而已哉孔子春秋成遊夏不能贊一辭吾師注成蕙亦奚敢贅言但以身任録正故述梗概以冀同志者黽勉而深造焉廣陵門生李蕙拜跋
